openapi: 3.0.0
info:
  title: Kube-Vim Configuration Schema
  version: 1.0.0
components:
  schemas:
    Config:
      type: object
      description: "Top-level configuration node for kube-vim."
      properties:
        service:
          $ref: '#/components/schemas/ServiceConfig'
        k8s:
          $ref: '#/components/schemas/K8sConfig'
        image:
          $ref: '#/components/schemas/ImageConfig'
        network:
          $ref: '#/components/schemas/NetworkConfig'
        compute:
          $ref: '#/components/schemas/ComputeConfig'
        monitoring:
          $ref: '#/components/schemas/MonitoringConfig'
    ServiceConfig:
      type: object
      description: "Configuration related to the kube-vim service."
      properties:
        logLevel:
          $ref: './common.openapi.yaml#/components/schemas/logLevel'
        server:
          $ref: '#/components/schemas/ServerConfig'
    ServerConfig:
      type: object
      description: "Kube-vim Server configuration."
      properties:
        port:
          $ref: './common.openapi.yaml#/components/schemas/port'
          default: 50051
          description: "Kube-vim gRPC service listening port."
        tls:
          $ref: './common.openapi.yaml#/components/schemas/tlsServerConfig'
          description: "Kube-vim gRPC service TLS configuration."
    K8sConfig:
      type: object
      description: "Configuration related to Kubernetes operations."
      properties:
        namespace:
          type: string
          default: "kube-nfv"
          description: "Kubernetes namespace where kube-vim operates. Default is 'kube-nfv'."
        config:
          type: string
          description: "Specific path to find k8s config file. By default k8s ServiceAccount place is used"

    ImageConfig:
      type: object
      description: "Configuration for kube-vim image providers."
      properties:
        storageClass:
          type: string
          default: "default"
          description: "Kubernetes StorageClass for software image PVCs. By default 'default' storageClass will be used"
        http:
          $ref: '#/components/schemas/HttpImageConfig'
        local:
          $ref: '#/components/schemas/LocalImageConfig'
        glance:
          $ref: '#/components/schemas/GlanceImageConfig'
    HttpImageConfig:
      type: object
      description: "Configuration for HTTP image provider."
    LocalImageConfig:
      type: object
      description: "Configuration for Local image provider."
      properties:
        location:
          type: string
          description: "Location where to locate images."
    GlanceImageConfig:
      type: object
      description: "Configuration for Glance image provider."

    NetworkConfig:
      type: object
      description: "Configuration for kube-vim cluster static network."
      properties:
        managementNetwork:
          $ref: '#/components/schemas/ManagementNetworkConfig'
          description: "Configuration for the kube-vim-managed shared management network."
        sriov:
          $ref: '#/components/schemas/SriovNetworkConfig'
          description: "Configuration for SR-IOV networks (rendered as ovs-cni NADs for OVS hardware offload)."

    SriovNetworkConfig:
      type: object
      description: |
        Settings applied to every SR-IOV network kube-vim creates. SR-IOV
        networks are rendered as ovs-cni NetworkAttachmentDefinitions so the
        VF representor is attached to an OVS bridge, enabling OVS hardware
        offload of the VF traffic. ovs-cni auto-discovers the bridge from the
        VF's PF (the PF uplink must already be a port on the bridge), which is
        the correct behaviour for multi-PF hosts where each PF has its own
        bridge.
      properties:
        socketFile:
          type: string
          default: "unix:/var/run/openvswitch/db.sock"
          description: |
            OVSDB socket ovs-cni connects to. Defaults to the standard path;
            on kube-OVN/Talos hosts the socket lives at /run/openvswitch/db.sock
            (reachable via the /var/run -> /run symlink, or set explicitly).

    ManagementNetworkConfig:
      type: object
      description: |
        Optional kube-vim-managed shared management network used by an NFVO
        (e.g. OSM) for control-plane reachability to VMs. When enabled,
        kube-vim ensures a kube-OVN Vpc + Subnet + NetworkAttachmentDefinition
        exist at startup with all the labels kube-vim's internal lookups
        require. The trio is reconciled on every kube-vim restart and never
        deleted by NS termination.
      properties:
        enabled:
          type: boolean
          default: false
          description: "Whether kube-vim should provision and own the management network. Default off; opt-in."
        name:
          type: string
          default: "osm-mgmt"
          description: "kube-OVN Vpc name. Used as the base for the subnet name (`{name}-subnet-0`) and the default NetworkAttachmentDefinition name."
        cidr:
          type: string
          default: "10.240.0.0/24"
          description: "Subnet CIDR. Must not overlap with the cluster pod or service CIDR. Updates are not applied to running subnets to avoid disrupting workloads."
        gateway:
          type: string
          description: "Optional gateway IP. Defaults to the first usable address of `cidr`."
        excludeIps:
          type: array
          items:
            type: string
          description: "Optional list of IPs (or ranges) to exclude from IPAM allocation."
        netAttachDefName:
          type: string
          description: "NetworkAttachmentDefinition name. Defaults to `{subnet-name}-netattach` to match kube-vim's existing convention."
        netAttachDefNamespace:
          type: string
          description: "Namespace of the NetworkAttachmentDefinition. Defaults to the kube-vim namespace from the `k8s` section."

    ComputeConfig:
      type: object
      description: "Configuration for compute resource scheduling."
      properties:
        nodeSelector:
          type: object
          additionalProperties:
            type: string
          description: "Node selector labels for VM placement."
        tolerations:
          type: array
          items:
            $ref: '#/components/schemas/Toleration'
          description: "Tolerations for VM scheduling."

    MonitoringConfig:
      type: object
      description: |
        Configuration for kube-vim telemetry. When enabled, kube-vim serves a
        Prometheus /metrics endpoint on a dedicated port. The endpoint exposes
        kube-vim's own operational metrics and the `kubevim_*_info` correlation
        metrics used to join backend (KubeVirt/kube-OVN/SR-IOV) series to ETSI
        resource IDs in Prometheus. kube-vim never proxies or re-exports backend
        counters.
      properties:
        enabled:
          type: boolean
          default: false
          description: "Whether kube-vim serves the Prometheus /metrics endpoint. Default off; opt-in."
        metricsPort:
          $ref: './common.openapi.yaml#/components/schemas/port'
          default: 9095
          description: "Port for the Prometheus /metrics endpoint."

    Toleration:
      type: object
      description: "Kubernetes toleration for pod/VM scheduling."
      properties:
        key:
          type: string
        operator:
          type: string
          enum: ["Exists", "Equal"]
        value:
          type: string
        effect:
          type: string
          enum: ["NoSchedule", "PreferNoSchedule", "NoExecute"]
        tolerationSeconds:
          type: integer
          format: int64
